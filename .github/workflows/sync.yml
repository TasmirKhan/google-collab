name: Auto Sync Colab

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Google Drive
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Sync Drive → Repo
        run: |
          rclone sync drive:colab-sync ./colab-files

      - name: Commit changes
        run: |
          git config user.name "Tasmir Khan"
          git config user.email "masteroffcodes@gmail.com"
          git add .
          git commit -m "Auto sync from Colab" || echo "No changes"
          git push
